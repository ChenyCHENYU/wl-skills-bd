name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24
          - os: windows-latest
            node: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
      - run: npm ci
      - run: npm run verify
      - if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run verify:quality-maven
      - run: npm pack --dry-run --ignore-scripts
